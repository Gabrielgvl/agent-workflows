name: Run Codex Review
description: Run a hardened Codex PR review and parse severity counts.

inputs:
  working_directory:
    description: Repository checkout path.
    required: false
    default: repo
  review_base:
    description: Pull-request base branch name.
    required: true
  review_model:
    description: Codex model to use.
    required: false
    default: gpt-5.4
  review_timeout_seconds:
    description: Inner review timeout in seconds.
    required: false
    default: "900"
  review_output_path:
    description: Review output file path relative to the working directory.
    required: false
    default: codex-review.txt

outputs:
  codex_exit_code:
    description: Exit code from the Codex review command.
    value: ${{ steps.review.outputs.codex_exit_code }}
  p0_count:
    description: Parsed P0 finding count.
    value: ${{ steps.parse.outputs.p0_count }}
  p1_count:
    description: Parsed P1 finding count.
    value: ${{ steps.parse.outputs.p1_count }}
  p2_count:
    description: Parsed P2 finding count.
    value: ${{ steps.parse.outputs.p2_count }}
  p3_count:
    description: Parsed P3 finding count.
    value: ${{ steps.parse.outputs.p3_count }}
  parse_inconclusive:
    description: Whether parser fallback detected inconclusive findings.
    value: ${{ steps.parse.outputs.parse_inconclusive }}
  parse_failed:
    description: Whether parsing failed entirely.
    value: ${{ steps.parse.outputs.parse_failed }}

runs:
  using: composite
  steps:
    - id: review
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      env:
        CODEX_REVIEW_BASE: ${{ inputs.review_base }}
        CODEX_REVIEW_MODEL: ${{ inputs.review_model }}
        CODEX_REVIEW_TIMEOUT_SECONDS: ${{ inputs.review_timeout_seconds }}
        CODEX_REVIEW_OUTPUT_PATH: ${{ inputs.review_output_path }}
      run: |
        set +e
        "${GITHUB_ACTION_PATH}/run_codex_review.sh"
        rc=$?
        set -e
        echo "codex_exit_code=$rc" >> "$GITHUB_OUTPUT"

    - id: parse
      if: ${{ always() }}
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      env:
        CODEX_REVIEW_OUTPUT_PATH: ${{ inputs.review_output_path }}
      run: |
        set -euo pipefail

        output_path="${CODEX_REVIEW_OUTPUT_PATH:-codex-review.txt}"

        write_default_parse_env() {
          cat > codex-parse.env <<'EOF'
        p0=0
        p1=0
        p2=0
        p3=0
        parse_inconclusive=0
        parse_failed=1
        EOF
        }

        if [ ! -f "$output_path" ]; then
          echo "::error::${output_path} was not generated."
          write_default_parse_env
        else
          set +e
          python3 "${GITHUB_ACTION_PATH}/parse_codex_review.py" "$output_path" > codex-parse.env
          rc=$?
          set -e
          if [ "$rc" -ne 0 ]; then
            echo "::error::Failed to parse ${output_path}."
            write_default_parse_env
          fi
        fi

        # shellcheck disable=SC1091
        source codex-parse.env

        echo "p0_count=$p0" >> "$GITHUB_OUTPUT"
        echo "p1_count=$p1" >> "$GITHUB_OUTPUT"
        echo "p2_count=$p2" >> "$GITHUB_OUTPUT"
        echo "p3_count=$p3" >> "$GITHUB_OUTPUT"
        echo "parse_inconclusive=$parse_inconclusive" >> "$GITHUB_OUTPUT"
        echo "parse_failed=$parse_failed" >> "$GITHUB_OUTPUT"
